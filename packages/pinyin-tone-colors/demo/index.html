<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pinyin-tone-colors — live demo</title>
<style>
  :root {
    --bg:#F1EFE8; --card:#FFFFFF; --border:#D3D1C7; --text:#1C1C1A;
    --muted:#5F5E5A; --faint:#888780; --primary:#E8650F; --primary-700:#B14E0C;
    --tone-1:#E24B4A; --tone-2:#BA7517; --tone-3:#639922; --tone-4:#378ADD; --tone-5:#888780;
    --radius:16px;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; background:var(--bg); color:var(--text);
    font-family:Inter,ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.5; padding:32px 20px;
  }
  .wrap { max-width:840px; margin:0 auto; }
  h1 { font-size:26px; margin:0 0 4px; }
  h1 code { color:var(--primary); font-size:0.85em; }
  .sub { color:var(--muted); margin:0 0 28px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:22px; margin-bottom:20px; }
  .han { font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",ui-sans-serif,sans-serif; }
  .showcase { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .col { text-align:center; min-width:96px; }
  .col .c { font-size:60px; font-weight:600; line-height:1; }
  .col .p { font-size:22px; margin-top:6px; }
  .col .t { font-size:12px; color:var(--faint); margin-top:8px; }
  label { display:block; font-size:13px; color:var(--muted); margin:0 0 6px; font-weight:500; }
  input[type=text] {
    width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:12px;
    font-size:15px; font-family:inherit; background:#fff; color:var(--text);
  }
  input[type=text]:focus { outline:2px solid var(--primary); border-color:var(--primary); }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:200px; }
  .seg { display:flex; gap:10px; margin-top:14px; }
  .seg button {
    border:1px solid var(--border); background:#fff; color:var(--text); border-radius:10px;
    padding:8px 14px; font-size:14px; cursor:pointer; font-family:inherit;
  }
  .seg button[aria-pressed=true] { background:var(--primary); color:#fff; border-color:var(--primary); }
  .out { font-family:"Noto Sans SC",Inter,sans-serif; font-size:56px; font-weight:600; text-align:center; padding:26px 10px; line-height:1.2; word-break:break-word; }
  .html { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12.5px; color:var(--muted);
    background:#F7F6F2; border:1px solid var(--border); border-radius:10px; padding:12px; overflow:auto; white-space:pre-wrap; word-break:break-all; }
  .presets { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
  .presets button { border:1px dashed var(--border); background:#fff; border-radius:999px; padding:6px 12px; font-size:13px; cursor:pointer; font-family:inherit; color:var(--muted); }
  .palette { display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  .sw { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted); }
  .sw input[type=color] { width:34px; height:28px; border:1px solid var(--border); border-radius:8px; background:#fff; padding:0; cursor:pointer; }
  .foot { color:var(--faint); font-size:13px; text-align:center; margin-top:8px; }
  .foot a { color:var(--primary-700); }
</style>
</head>
<body>
<div class="wrap">
  <h1><code>pinyin-tone-colors</code> — live demo</h1>
  <p class="sub">Colour Mandarin hanzi &amp; pinyin by tone. The tone comes from <em>numbered</em> pinyin; the digits are never shown.</p>

  <div class="card">
    <div class="showcase" id="showcase"></div>
    <p class="foot">妈 mā · 麻 má · 马 mǎ · 骂 mà — the same syllable in the four tones.</p>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <label for="text">Text (hanzi, or diacritic pinyin)</label>
        <input id="text" type="text" value="你好世界" />
      </div>
      <div>
        <label for="numbered">Numbered pinyin (tone source)</label>
        <input id="numbered" type="text" value="ni3 hao3 shi4 jie4" />
      </div>
    </div>
    <div class="seg" role="group" aria-label="mode">
      <button id="mHan" aria-pressed="true">hanzi</button>
      <button id="mPin" aria-pressed="false">pinyin</button>
    </div>
    <div class="presets" id="presets"></div>

    <div class="out han" id="out"></div>
    <div class="html" id="html"></div>
  </div>

  <div class="card">
    <label>Palette (editable — every colour is overridable in the API)</label>
    <div class="palette" id="palette"></div>
  </div>

  <p class="foot">Mirrors the package core. Get it: <a href="https://www.npmjs.com/package/pinyin-tone-colors">npm i pinyin-tone-colors</a> · MIT © Codingqueen40</p>
</div>

<script>
// ── Faithful mirror of the package core (src/core.ts) ────────────────
let PALETTE = { 1:"#E24B4A", 2:"#BA7517", 3:"#639922", 4:"#378ADD", 5:"#888780" };

function parseNumberedPinyin(numbered) {
  return numbered.trim().split(/\s+/).filter(Boolean).map((syl) => {
    const m = /^([a-zü]+?)([1-5])$/i.exec(syl);
    return m ? { toneless:m[1], tone:Number(m[2]) } : { toneless:syl, tone:0 };
  });
}
function colorHanzi(hanzi, numbered) {
  if (!numbered) return [{ text:hanzi, tone:0 }];
  const chars = Array.from(hanzi);
  const syls = parseNumberedPinyin(numbered);
  if (chars.length !== syls.length) return [{ text:hanzi, tone:0 }];
  return chars.map((c,i) => ({ text:c, tone:syls[i].tone }));
}
function colorPinyin(pinyin, numbered) {
  if (!numbered) return [{ text:pinyin, tone:0 }];
  const syls = parseNumberedPinyin(numbered);
  const clean = Array.from(pinyin.normalize("NFC").replace(/['’‘\-\s]/g,""));
  const segs = []; let i = 0;
  for (const s of syls) { const len = s.toneless.length; segs.push({ text:clean.slice(i,i+len).join(""), tone:s.tone }); i += len; }
  if (i !== clean.length) return [{ text:pinyin, tone:0 }];
  return segs;
}
function toneSegments(text, numbered, mode) {
  return mode === "pinyin" ? colorPinyin(text, numbered) : colorHanzi(text, numbered);
}
function esc(s){ return s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function segmentsToHtml(segs) {
  return segs.map(seg => {
    const color = seg.tone === 0 ? undefined : PALETTE[seg.tone];
    return `<span${color?` style="color:${color}"`:""}>${esc(seg.text)}</span>`;
  }).join("");
}

// ── UI ───────────────────────────────────────────────────────────────
let MODE = "hanzi";
const $ = (id) => document.getElementById(id);

function render() {
  const text = $("text").value, numbered = $("numbered").value;
  const html = segmentsToHtml(toneSegments(text, numbered, MODE));
  $("out").innerHTML = html || '<span style="color:#888780;font-size:20px">—</span>';
  $("html").textContent = html;
}

const showcase = [["妈","mā",1],["麻","má",2],["马","mǎ",3],["骂","mà",4]];
function renderShowcase(){
  $("showcase").innerHTML = showcase.map(([c,p,t]) =>
    `<div class="col"><div class="c han" style="color:${PALETTE[t]}">${c}</div><div class="p" style="color:${PALETTE[t]}">${p}</div><div class="t">tone ${t}</div></div>`
  ).join("");
}

const presets = [
  ["你好世界","ni3 hao3 shi4 jie4","hanzi"],
  ["中文很有趣","zhong1 wen2 hen3 you3 qu4","hanzi"],
  ["xièxie","xie4 xie5","pinyin"],
  ["Xī'ān","xi1 an1","pinyin"],
];
$("presets").innerHTML = presets.map((p,i) => `<button data-i="${i}">${p[0]}</button>`).join("");
$("presets").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  const [t,n,m] = presets[+b.dataset.i];
  $("text").value = t; $("numbered").value = n; setMode(m); render();
});

function setMode(m){ MODE = m; $("mHan").setAttribute("aria-pressed", m==="hanzi"); $("mPin").setAttribute("aria-pressed", m==="pinyin"); }
$("mHan").onclick = () => { setMode("hanzi"); render(); };
$("mPin").onclick = () => { setMode("pinyin"); render(); };

function renderPalette(){
  $("palette").innerHTML = [1,2,3,4,5].map(t =>
    `<div class="sw"><input type="color" value="${PALETTE[t]}" data-t="${t}"><span>tone ${t}</span></div>`
  ).join("");
  $("palette").querySelectorAll("input[type=color]").forEach(inp => {
    inp.oninput = () => { PALETTE[inp.dataset.t] = inp.value; renderShowcase(); render(); };
  });
}

$("text").addEventListener("input", render);
$("numbered").addEventListener("input", render);
renderShowcase(); renderPalette(); render();
</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" width="880" height="260" role="img" aria-label="pinyin-tone-colors: ma ma ma ma in the four Mandarin tone colours">
  <title>pinyin-tone-colors — colour Mandarin by tone</title>
  <defs>
    <style>
      .card { fill: #FBFAF7; stroke: #E5E3DB; stroke-width: 1.5; }
      .label { font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Inter, sans-serif; }
      .han { font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", ui-sans-serif, sans-serif; font-weight: 600; }
      .col { opacity: 0; animation: rise .6s ease-out forwards; }
      .c1 { animation-delay: .10s; } .c2 { animation-delay: .28s; }
      .c3 { animation-delay: .46s; } .c4 { animation-delay: .64s; }
      .bar { transform-origin: center bottom; animation: pulse 2.4s ease-in-out infinite; }
      @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .col { opacity: 1; animation: none; transform: none; }
        .bar { animation: none; opacity: 1; }
      }
    </style>
  </defs>

  <rect class="card" x="1" y="1" width="878" height="258" rx="24" />

  <text class="label" x="48" y="58" font-size="20" fill="#5F5E5A">pinyin-tone-colors</text>
  <text class="label" x="48" y="86" font-size="15" fill="#888780">colour Mandarin hanzi &amp; pinyin by tone — the four tones, one glance</text>

  <!-- 妈 mā — 1st tone -->
  <g class="col c1" transform="translate(150,150)">
    <text class="han" text-anchor="middle" font-size="72" fill="#E24B4A">妈</text>
    <text class="label" text-anchor="middle" y="46" font-size="24" fill="#E24B4A">mā</text>
    <rect class="bar" x="-34" y="62" width="68" height="5" rx="2.5" fill="#E24B4A" />
    <text class="label" text-anchor="middle" y="90" font-size="12" fill="#888780">tone 1</text>
  </g>

  <!-- 麻 má — 2nd tone -->
  <g class="col c2" transform="translate(360,150)">
    <text class="han" text-anchor="middle" font-size="72" fill="#BA7517">麻</text>
    <text class="label" text-anchor="middle" y="46" font-size="24" fill="#BA7517">má</text>
    <rect class="bar" x="-34" y="62" width="68" height="5" rx="2.5" fill="#BA7517" />
    <text class="label" text-anchor="middle" y="90" font-size="12" fill="#888780">tone 2</text>
  </g>

  <!-- 马 mǎ — 3rd tone -->
  <g class="col c3" transform="translate(570,150)">
    <text class="han" text-anchor="middle" font-size="72" fill="#639922">马</text>
    <text class="label" text-anchor="middle" y="46" font-size="24" fill="#639922">mǎ</text>
    <rect class="bar" x="-34" y="62" width="68" height="5" rx="2.5" fill="#639922" />
    <text class="label" text-anchor="middle" y="90" font-size="12" fill="#888780">tone 3</text>
  </g>

  <!-- 骂 mà — 4th tone -->
  <g class="col c4" transform="translate(780,150)">
    <text class="han" text-anchor="middle" font-size="72" fill="#378ADD">骂</text>
    <text class="label" text-anchor="middle" y="46" font-size="24" fill="#378ADD">mà</text>
    <rect class="bar" x="-34" y="62" width="68" height="5" rx="2.5" fill="#378ADD" />
    <text class="label" text-anchor="middle" y="90" font-size="12" fill="#888780">tone 4</text>
  </g>
</svg>
